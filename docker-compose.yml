services:

  stakeholders-db:
    image: postgres:17-alpine
    container_name: stakeholders_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: stakeholders
    ports: 
      - "5432:5432"
    volumes:
      - stakeholder_data:/var/lib/postgresql/data
    networks:
      - soa_network

  blogs-db:
    image: postgres:17-alpine
    container_name: blogs_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: blogs
    ports: 
      - "5433:5432"
    volumes:
      - blog_data:/var/lib/postgresql/data
    networks:
      - soa_network

  api_gateway:
    build:
      context: ./apps
      dockerfile: api-gateway/Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - soa_network
    depends_on:
      stakeholder-service:
        condition: service_started
      blog-service:
        condition: service_started
      auth-service:
        condition: service_healthy
   
  auth-service:
    build:
      context: ./apps
      dockerfile: auth-service/Dockerfile
    container_name: auth_service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      JWT_SECRET: your-secret-key-change-this-in-production
    networks:
      - soa_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  stakeholder-service:
    build:
      context: ./apps
      dockerfile: stakeholder-service/Dockerfile
    container_name: stakeholder_service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: stakeholders-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: stakeholders
      DB_SSLMODE: disable
      SERVER_PORT: 8082
      JWT_SECRET: your-secret-key-change-this-in-production
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - soa_network
    depends_on:
      stakeholders-db:
        condition: service_started
      auth-service:
        condition: service_healthy

  blog-service:
    build:
      context: ./apps
      dockerfile: blog-service/Dockerfile
    container_name: blog_service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: blogs-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: blogs
      SERVER_PORT: 8083
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - soa_network
    depends_on:
      blogs-db:
        condition: service_started
      auth-service:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "3000:80"
    networks:
      - soa_network
    depends_on:
      api_gateway:
        condition: service_started

networks:
  soa_network:
    driver: bridge

volumes:
  stakeholder_data:
  blog_data:
