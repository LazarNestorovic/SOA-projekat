services:

  postgres:
    image: postgres:15-alpine
    container_name: stakeholder_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stakeholder_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/stakeholder-service/migrations:/docker-entrypoint-initdb.d
    networks:
      - soa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  stakeholder-service:
    build:
      context: ./apps/stakeholder-service
      dockerfile: Dockerfile
    container_name: stakeholder_service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: stakeholder_service
      DB_SSLMODE: disable
      SERVER_PORT: 8082
      JWT_SECRET: your-secret-key-change-this-in-production
    networks:
      - soa_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  soa_network:
    driver: bridge
