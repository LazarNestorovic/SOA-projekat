services:

  neo4j:
    image: neo4j:5.26
    container_name: neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - soa_network

  stakeholders-db:
    image: postgres:17-alpine
    container_name: stakeholders_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: stakeholders
    ports:
      - "5434:5432"
    volumes:
      - stakeholder_data:/var/lib/postgresql/data
    networks:
      - soa_network

  blogs-db:
    image: postgres:17-alpine
    container_name: blogs_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: blogs
    ports: 
      - "5433:5432"
    volumes:
      - blog_data:/var/lib/postgresql/data
    networks:
      - soa_network

  api_gateway:
    build:
      context: ./apps
      dockerfile: api-gateway/Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - soa_network
    depends_on:
      stakeholder-service:
        condition: service_started
      blog-service:
        condition: service_started
      auth-service:
        condition: service_healthy
   
  auth-service:
    build:
      context: ./apps
      dockerfile: auth-service/Dockerfile
    container_name: auth_service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      JWT_SECRET: your-secret-key-change-this-in-production
    networks:
      - soa_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  stakeholder-service:
    build:
      context: ./apps
      dockerfile: stakeholder-service/Dockerfile
    container_name: stakeholder_service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: stakeholders-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: stakeholders
      DB_SSLMODE: disable
      SERVER_PORT: 8082
      JWT_SECRET: your-secret-key-change-this-in-production
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - soa_network
    depends_on:
      stakeholders-db:
        condition: service_started
      auth-service:
        condition: service_healthy

  blog-service:
    build:
      context: ./apps
      dockerfile: blog-service/Dockerfile
    container_name: blog_service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: blogs-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: blogs
      SERVER_PORT: 8083
      AUTH_SERVICE_URL: http://auth-service:8081
      FOLLOWER_SERVICE_URL: http://follower-service:8084
    networks:
      - soa_network
    depends_on:
      blogs-db:
        condition: service_started
      auth-service:
        condition: service_healthy

  follower-service:
    build:
      context: ./apps
      dockerfile: follower-service/Dockerfile
    container_name: follower_service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      AUTH_SERVICE_URL: http://auth-service:8081
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    networks:
      - soa_network
    depends_on:
      neo4j:
        condition: service_started
      auth-service:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "3000:80"
    networks:
      - soa_network
    depends_on:
      api_gateway:
        condition: service_started

networks:
  soa_network:
    driver: bridge

volumes:
  stakeholder_data:
  blog_data:
  neo4j_data: