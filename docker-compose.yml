services:

  stakeholder-service:
    build:
      context: ./apps/stakeholder-service
      dockerfile: Dockerfile
    container_name: stakeholder_service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: stakeholder_service
      DB_SSLMODE: disable
      SERVER_PORT: 8082
      JWT_SECRET: your-secret-key-change-this-in-production
    networks:
      - soa_network

volumes:
  postgres_data:

networks:
  soa_network:
    driver: bridge
