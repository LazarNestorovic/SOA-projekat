syntax = "proto3";

package stakeholder;

option go_package = "stakeholder-service/pb";

// DeductBalance — skida iznos sa balansa turiste.
// Koristi ga: Tour Service pri checkout-u (kupovina tura).

service StakeholderService {
  rpc DeductBalance(DeductBalanceRequest) returns (DeductBalanceResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetUsers(GetUsersRequest) returns (UserListResponse);
}

message DeductBalanceRequest {
  uint32 user_id = 1;
  double amount  = 2;
}

message DeductBalanceResponse {
  double new_balance = 1;
}

message GetUserRequest {
  uint32 user_id = 1;
  string requester_role = 2;
}

message GetUsersRequest {
  string requester_role = 1;
}

message UserResponse {
  User user = 1;
}

message UserListResponse {
  repeated User users = 1;
}

message User {
  uint32 id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  bool blocked = 5;
  double balance = 6;
  string created_at = 7;
}
